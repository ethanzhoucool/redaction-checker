# sensitive-screens.yml — describe the sensitive screens redaction-checker should test.
#
# Each platform lists screens to drive to, background, and snapshot. The checker recovers
# the OS snapshot (iOS app-switcher card / Android recents thumbnail) and decides PASS/FAIL.
# Control: OWASP MASVS MSTG-STORAGE-9 / PCI-MSTG.

ios:
  # backend: "revyl"  -> Revyl cloud sim, Control Center backgrounding (no local Xcode).
  #          "simctl" -> local Simulator + on-disk SplashBoard snapshot decode (default).
  backend: "revyl"
  bundle_id: com.revyl.redactiondemo
  revyl_app_id: 464a37fa-c56f-46a8-bac7-21cc19ab8397
  udid: "booted"                                  # simctl backend only: UDID or "booted"
  app_path: fixtures/ios/build/Build/Products/Debug-iphonesimulator/Cashly.app  # simctl backend only
  background_via: "launch_other"                  # simctl backend only
  # Control Center gestures default to the verified 1320x2868 sim; override here for other sizes:
  # gestures:
  #   cc_open:  { direction: down, x: 600, y: 2, duration: 1200 }
  #   cc_close: { direction: up,   x: 330, y: 1430, duration: 400 }
  screens:
    # A leaky payment screen — no privacy overlay on resign; the card form stays rendered
    # when backgrounded. revyl backend reaches it via `nav`; simctl backend via `launch_args`.
    - name: "Add Card (leaky)"
      launch_args: "leaky"                         # simctl backend
      nav:                                         # revyl backend: cold-launch to Home, tap the leaky button
        - { kill: true }
        - { launch: true }
        - { wait: 2 }
        - { tap: [220, 649] }
      expect: "Card number"                        # revyl backend: text that must be on the active screen (confirms we got there)
      sensitive: true
    # The same screen done right — a cover view obscures the window on scenePhase .inactive.
    - name: "Add Card (redacted)"
      launch_args: "redacted"                      # simctl backend
      nav:                                         # revyl backend: cold-launch to Home, tap the redacted button
        - { kill: true }
        - { launch: true }
        - { wait: 2 }
        - { tap: [233, 705] }
      expect: "Card number"
      sensitive: true

android:
  backend: "revyl"                                # "revyl" (cloud device) or "adb" (local emulator)
  revyl_app_id: "29c50057-cd5d-46b4-8c29-c6fbf3cc9efe"  # required when backend: revyl
  package: com.revyl.redactiondemo
  screens:
    # No FLAG_SECURE — the recents thumbnail captures the card + SSN form verbatim.
    - name: "SSN entry (leaky)"
      instruction: "open the leaky SSN screen"
      sensitive: true
    # FLAG_SECURE set via usePreventScreenCapture() — the recents thumbnail comes back black.
    - name: "SSN entry (secured)"
      instruction: "open the secured SSN screen"
      sensitive: true

# Regexes whose presence in a recovered snapshot constitutes a leak.
# Omit to use the defaults in redaction_check/contract.py (SSN, PAN, CVV, SSN/routing keywords).
secrets:
  - "\\b\\d{3}-\\d{2}-\\d{4}\\b"        # US SSN
  - "\\b(?:\\d[ -]?){13,19}\\b"         # PAN / payment card number
